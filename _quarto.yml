project:
  type: website
  output-dir: _site
  resources:
    - "CNAME"
    - "fonts/**"
    - "logos/**"
    - "images/**"
    - "profile.jpg"
    - "apple-touch-icon.png"
    - "favicon.png"
    - "favicon.svg"

website:
  title: "Leon Noirclerc"
  description: "Research notes, experiments, and projects."
  site-url: https://leonnoirclerc.github.io
  repo-url: https://github.com/leonnoirclerc/leonnoirclerc.github.io
  favicon: favicon.svg
  open-graph: true
  twitter-card: true
  search:
    location: navbar
    type: overlay
  navbar:
    pinned: true
    right:
      - href: index.qmd
        text: Posts
      - href: projects.qmd
        text: Projects
      - href: about.qmd
        text: About
      - icon: github
        href: https://github.com/leonnoirclerc
        aria-label: GitHub
  page-footer:
    left: "© 2026 Leon Noirclerc"
    right:
      - icon: github
        href: https://github.com/leonnoirclerc

format:
  html:
    theme: [cosmo, theme-light.scss]
    css: styles.css
    include-after-body:
      text: |
        <script>
        (function () {
          function tagCategories() {
            document.querySelectorAll('.listing-category').forEach(function (el) {
              var slug = (el.textContent || '').trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
              if (slug) el.classList.add('cat-' + slug);
            });
          }
          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', tagCategories);
          } else {
            tagCategories();
          }
        })();
        </script>
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    code-link: true
    highlight-style: github
    anchor-sections: true
    fig-cap-location: bottom
    tbl-cap-location: top
    smooth-scroll: true
